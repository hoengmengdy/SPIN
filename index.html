<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSV Lucky Spin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>LSV Lucky Spin</h1>
    <p>ស្កេន QR រួចបង្វិល ដើម្បីឈ្នះរង្វាន់មួយ!</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div id="winnerPopup" class="popup">
        <div class="popup-content">
            <img id="winnerImg" src="" alt="">
            <h2 id="winnerText"></h2>
            <button onclick="closePopup()">បិទ</button>
        </div>
    </div>

    <p id="result"></p>

    <button id="spinBtn" onclick="spin()">SPIN</button>

    <script src="script.js"></script>

    <script>
        function closePopup() {
            document.getElementById("winnerPopup").style.display = "none";
        }
    </script>

</body>

</html>
